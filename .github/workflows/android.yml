name: Android Fastlane CI

on:
  workflow_dispatch:
    inputs:
      lane:
        description: Fastlane lane to run
        required: false
        default: testers_build
        type: choice
        options:
          - ci
          - testers_build
      firebase_release_notes:
        description: Optional release notes shown to testers
        required: false
        default: "Automated tester build"
  push:
    branches:
      - main

jobs:
  fastlane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BUNDLE_GEMFILE: Gemfile
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
      FIREBASE_RELEASE_NOTES: ${{ github.event.inputs.firebase_release_notes }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Prepare Android signing files
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.lane == 'testers_build')
        shell: bash
        run: |
          set -euo pipefail

          # Validate all secrets exist
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 not set"
            exit 1
          fi
          if [[ -z "${ANDROID_KEYSTORE_PASSWORD}" ]]; then
            echo "ERROR: ANDROID_KEYSTORE_PASSWORD not set"
            exit 1
          fi
          if [[ -z "${ANDROID_KEY_ALIAS}" ]]; then
            echo "ERROR: ANDROID_KEY_ALIAS not set"
            exit 1
          fi
          if [[ -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "ERROR: ANDROID_KEY_PASSWORD not set"
            exit 1
          fi

          # Decode keystore
          echo "Decoding keystore from base64..."
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > app/upload-keystore.jks

          # Verify file was created and has content
          if [[ ! -f app/upload-keystore.jks ]] || [[ ! -s app/upload-keystore.jks ]]; then
            echo "ERROR: Keystore file is empty or wasn't created"
            exit 1
          fi

          echo "✓ Keystore file created ($(wc -c < app/upload-keystore.jks) bytes)"

          # Create properties file
          printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "${ANDROID_KEYSTORE_PASSWORD}" \
            "${ANDROID_KEY_ALIAS}" \
            "${ANDROID_KEY_PASSWORD}" \
            > app/keystore.properties
              
          echo "✓ Keystore properties configured"

      - name: Prepare Firebase service account
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.lane == 'testers_build')
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${FIREBASE_APP_ID}" ]]; then
            echo "Missing FIREBASE_APP_ID secret"
            exit 1
          fi

          if [[ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON secret"
            exit 1
          fi

          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" > firebase-service-account.json

      - name: Fetch testers from Firebase
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.lane == 'testers_build')
        shell: bash
        run: |
          set -euo pipefail

          echo "📋 Fetching testers from Firebase project..."

          PROJECT_ID=$(jq -r '.project_id' firebase-service-account.json)
          echo "Project ID: $PROJECT_ID"

          PRIVATE_KEY=$(jq -r '.private_key' firebase-service-account.json)
          CLIENT_EMAIL=$(jq -r '.client_email' firebase-service-account.json)

          HEADER='{"alg":"RS256","typ":"JWT"}'
          NOW=$(date +%s)
          EXPIRY=$((NOW + 3600))
          PAYLOAD="{\"iss\":\"$CLIENT_EMAIL\",\"scope\":\"https://www.googleapis.com/auth/cloud-platform\",\"aud\":\"https://oauth2.googleapis.com/token\",\"exp\":$EXPIRY,\"iat\":$NOW}"

          HEADER_ENCODED=$(echo -n "$HEADER" | base64 -w0 | tr '+/' '-_' | tr -d '=')
          PAYLOAD_ENCODED=$(echo -n "$PAYLOAD" | base64 -w0 | tr '+/' '-_' | tr -d '=')

          MESSAGE="$HEADER_ENCODED.$PAYLOAD_ENCODED"
          SIGNATURE=$(echo -n "$MESSAGE" | openssl dgst -sha256 -sign <(echo "$PRIVATE_KEY") | base64 -w0 | tr '+/' '-_' | tr -d '=')
          JWT="$MESSAGE.$SIGNATURE"

          TOKEN_RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$JWT")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [[ -z "$ACCESS_TOKEN" ]] || [[ "$ACCESS_TOKEN" == "null" ]]; then
            echo "❌ Failed to get access token"
            echo "Response: $TOKEN_RESPONSE"
            exit 1
          fi

          echo "✓ Got access token"

          PROJECT_RESPONSE=$(curl -s -X GET \
            "https://firebase.googleapis.com/v1beta1/projects/$PROJECT_ID" \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          echo "Firebase project response: $PROJECT_RESPONSE"

          PROJECT_NUMBER=$(echo "$PROJECT_RESPONSE" | jq -r '.projectNumber')

          if [[ -z "$PROJECT_NUMBER" ]] || [[ "$PROJECT_NUMBER" == "null" ]]; then
            echo "❌ Failed to resolve Firebase project number"
            echo "Response: $PROJECT_RESPONSE"
            exit 1
          fi

          echo "Project number: $PROJECT_NUMBER"

          TESTERS_RESPONSE=$(curl -s -X GET \
            "https://firebaseappdistribution.googleapis.com/v1/projects/$PROJECT_NUMBER/testers?pageSize=1000" \
            -H "Authorization: Bearer $ACCESS_TOKEN")

          echo "Firebase API Response: $TESTERS_RESPONSE"

          TESTER_EMAILS=$(echo "$TESTERS_RESPONSE" | jq -r '.testers[].email' 2>/dev/null || echo "")

          if [[ -z "$TESTER_EMAILS" ]]; then
            echo "⚠️  No testers found in Firebase project"
            echo "FIREBASE_TESTERS=" >> $GITHUB_ENV
          else
            TESTERS_CSV=$(echo "$TESTER_EMAILS" | tr '\n' ',' | sed 's/,$//')
            echo "✓ Found testers: $TESTERS_CSV"
            echo "FIREBASE_TESTERS=$TESTERS_CSV" >> $GITHUB_ENV
          fi

      - name: Debug keystore setup
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking if keystore file exists..."
          ls -lh app/upload-keystore.jks || echo "Keystore file not found!"

          echo "Checking keystore.properties..."
          cat app/keystore.properties || echo "No keystore.properties"

          echo "File size:"
          wc -c < app/upload-keystore.jks || echo "Could not read keystore"

      - name: Run Fastlane lane
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" || ("${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.lane }}" == "testers_build") ]]; then
            bundle exec fastlane android testers_build
          else
            bundle exec fastlane android ci
          fi

      - name: Upload release APK artifact
        if: success() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.lane == 'testers_build'))
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk

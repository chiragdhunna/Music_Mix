name: Android Fastlane CI

on:
  workflow_dispatch:
    inputs:
      lane:
        description: Fastlane lane to run
        required: false
        default: testers_build
        type: choice
        options:
          - ci
          - testers_build
      firebase_testers:
        description: Optional comma-separated tester emails for Firebase App Distribution
        required: false
        default: ""
      firebase_groups:
        description: Optional comma-separated Firebase tester groups
        required: false
        default: ""
      firebase_release_notes:
        description: Optional release notes shown to testers
        required: false
        default: "Automated tester build"
  push:
    branches:
      - main

jobs:
  fastlane:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BUNDLE_GEMFILE: Gemfile
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_TESTERS: ${{ secrets.FIREBASE_TESTERS }}
      FIREBASE_GROUPS: ${{ secrets.FIREBASE_GROUPS }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
      FIREBASE_RELEASE_NOTES: ${{ github.event.inputs.firebase_release_notes }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Prepare Android signing files
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.lane == 'testers_build')
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" || -z "${ANDROID_KEYSTORE_PASSWORD}" || -z "${ANDROID_KEY_ALIAS}" || -z "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "Missing one or more Android signing secrets"
            exit 1
          fi

          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > app/upload-keystore.jks
          cat > app/keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Prepare Firebase service account
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.lane == 'testers_build')
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${FIREBASE_APP_ID}" ]]; then
            echo "Missing FIREBASE_APP_ID secret"
            exit 1
          fi

          if [[ -z "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON secret"
            exit 1
          fi

          printf '%s' "${FIREBASE_SERVICE_ACCOUNT_JSON}" > firebase-service-account.json

      - name: Run Fastlane lane
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" || ("${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.lane }}" == "testers_build") ]]; then
            bundle exec fastlane android testers_build
          else
            bundle exec fastlane android ci
          fi

      - name: Upload release APK artifact
        if: success() && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.lane == 'testers_build'))
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
